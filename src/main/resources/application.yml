      membership-csv-path: ""
      shares-csv-path: ""
      expand-open-ended-ranges: false
      open-ended-to-date: ""
    macro-vintage:
      enabled: false
      exit-on-complete: false
      fetch-fred-api: false
      index-code: SP500
      series-codes: DGS3MO,FEDFUNDS,CPIAUCSL,UNRATE
      api-key: ${FRED_API_KEY:}
      csv-path: ""
      years: 5

      index-code: SP500
    optimizer-shadow:
      enabled: false
      exit-on-complete: false
      index-code: SP500
      result-limit: 100000
      date-limit: 0
    dashboard-view:
      enabled: false
      exit-on-complete: false
      index-code: SP500
      index-codes: SP500,NASDAQ100,DOW30
    backtest-view:
      enabled: false
      exit-on-complete: false
      index-code: SP500
      index-codes: SP500
  signal:
    refresh:
      enabled: true
      run-on-startup: true
      index-code: SP500
      initial-delay-millis: 3600000
      fixed-delay-millis: 3600000

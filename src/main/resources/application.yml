      to-date: ""
    macro-regime:
      enabled: false
      exit-on-complete: false
      index-code: SP500
      date-limit: 1500
      lookback-days: 126
    expected-return:
      enabled: false
      exit-on-complete: false
      index-code: SP500
      index-codes: SP500,NASDAQ100,DOW30
      result-limit: 100000
      date-limit: 80
      min-training-rows: 300
      historical-enabled: true
      live-enabled: true
      v3-enabled: true
      v3-historical-enabled: true
      v3-live-enabled: true
      v4-enabled: true
      v4-historical-enabled: true
      v4-live-enabled: true
      v5-enabled: true
      v5-historical-enabled: true
      v5-live-enabled: true

spring:
  application:
    name: codex-demo
  config:
    import: optional:file:./config/application-secret.yml
  profiles:
    default: local

server:
  port: ${PORT:8080}

finnhub:
  api-key: ${FINNHUB_API_KEY:}
  base-url: https://finnhub.io/api/v1
  quote-cache-seconds: 60
  profile-cache-hours: 24
  metrics-cache-hours: 24
  news-cache-minutes: 30
  recommendation-enabled: true
  recommendation-cache-hours: 24
  eps-surprises-enabled: true
  eps-surprises-cache-hours: 24
  candle-enabled: false
  candle-cache-hours: 24

sec:
  edgar:
    base-url: https://data.sec.gov
    files-base-url: https://www.sec.gov
    user-agent: ${SEC_EDGAR_USER_AGENT:king-yurina-stock-research/0.1 contact@example.com}
    company-facts-cache-hours: 168
    max-facts-per-concept: 80
    request-delay-millis: 300
    full-concept-enabled: false

stooq:
  base-url: https://stooq.com/q/d/l/
  default-years: 5
  request-delay-millis: 300

yahoo-chart:
  base-url: https://query1.finance.yahoo.com/v8/finance/chart/
  default-years: 5
  request-delay-millis: 250

toss:
  api-key: ${TOSS_API_KEY:}
  secret-key: ${TOSS_SECRET_KEY:}
  base-url: https://openapi.tossinvest.com
  timeout-seconds: 15

app:
  batch:
    toss:
      enabled: false
      exit-on-complete: false
      symbol-limit: 100
      candle-count: 120
      trade-count: 20
      delay-millis: 250
      index-codes: SP500
      symbols: ""
      prices: true
      stock-info: true
      candles: true
      warnings: true
      price-limits: false
      exchange-rate: true
      calendar: true
      orderbook: false
      trades: false
    yahoo-candle:
      enabled: false
      exit-on-complete: false
      symbol-limit: 1000
      years: 5
      delay-millis: 250
      index-codes: SP500,NASDAQ100,DOW30
      symbols: ""
    historical-backtest:
      enabled: false
      exit-on-complete: false
      index-code: SP500
      years: 3
      symbol-limit: 1000
      date-limit: 40
    etf-yahoo:
      enabled: false
      exit-on-complete: false
      symbol-limit: 150
      years: 3
      delay-millis: 250
      symbols: ""
    stooq-candle:
      enabled: false
      exit-on-complete: false
      symbol-limit: 1000
      years: 5
      delay-millis: 300
      index-codes: SP500,NASDAQ100,DOW30
      symbols: ""
    sec-edgar:
      enabled: false
      sync-enabled: true
      exit-on-complete: false
      symbol-limit: 1000
      index-codes: SP500,NASDAQ100,DOW30
      symbols: ""
      rebuild-standard: false
    finnhub:
      index-codes: ""
    index:
      stale-hours: 24
      sp500-sync-enabled: false
      nasdaq100-sync-enabled: false
      dow30-sync-enabled: false
    risk-snapshot:
      enabled: false
      exit-on-complete: false
      index-code: SP500
      result-limit: 100000
    market-snapshot:
      enabled: false
      exit-on-complete: false
      index-code: SP500
      index-codes: SP500,NASDAQ100,DOW30
      years: 5
      from-date: ""
      to-date: ""
    covariance-snapshot:
      enabled: false
      exit-on-complete: false
      index-code: SP500
      index-codes: SP500,NASDAQ100,DOW30
      date-limit: 80
      candidate-limit: 120
      lookback-days: 126
    risk-free-rate:

spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.mariadb.jdbc.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_MAX_SIZE:5}
      minimum-idle: ${DB_POOL_MIN_IDLE:1}
      connection-timeout: ${DB_CONNECTION_TIMEOUT_MS:30000}
      initialization-fail-timeout: ${DB_INITIALIZATION_FAIL_TIMEOUT_MS:60000}
  sql:
    init:
      mode: ${SQL_INIT_MODE:never}
      schema-locations: classpath:schema-mariadb.sql
      data-locations:
        - classpath:data-mariadb.sql
        - classpath:data-etf-seed.sql
  lifecycle:
    timeout-per-shutdown-phase: 20s

server:
  shutdown: graceful
  forward-headers-strategy: framework

mybatis:
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true

app:
  signal:
    refresh:
      enabled: false
      run-on-startup: false
